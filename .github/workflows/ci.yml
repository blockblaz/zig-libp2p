on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

name: CI

jobs:
  zig:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Free disk space
      run: |
        echo "Disk before cleanup:"
        df -h /
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
          /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
          /usr/local/share/chromium /usr/local/share/powershell \
          /opt/microsoft /usr/share/swift "$AGENT_TOOLSDIRECTORY" || true
        sudo apt-get clean || true
        sudo docker image prune --all --force || true
        sudo docker system prune --all --force --volumes || true
        echo "Disk after cleanup:"
        df -h /

    - name: Set up Zig
      uses: mlugg/setup-zig@v2.0.5
      with:
        version: 0.16.0

    - name: Cache Zig packages
      uses: actions/cache@v4
      with:
        # Package store only — do not cache global build artifacts (o/tmp),
        # which balloon restore size and have caused runner disk exhaustion.
        path: ~/.cache/zig/p
        key: ${{ runner.os }}-zig-p-${{ hashFiles('build.zig.zon', 'build.zig', 'examples/**') }}
        restore-keys: |
          ${{ runner.os }}-zig-p-

    - name: Prune stale Zig global cache artifacts
      run: |
        du -sh ~/.cache/zig 2>/dev/null || true
        rm -rf ~/.cache/zig/o ~/.cache/zig/tmp || true
        df -h /

    - name: Fetch Zig dependencies
      run: |
        max_attempts=3
        for attempt in $(seq 1 $max_attempts); do
          if zig build --fetch; then
            echo "Successfully fetched dependencies on attempt $attempt"
            exit 0
          fi
          echo "Attempt $attempt/$max_attempts failed, retrying in 5 seconds..."
          rm -rf ~/.cache/zig/o ~/.cache/zig/tmp || true
          sleep 5
        done
        echo "All fetch attempts failed"
        exit 1

    - name: Lint
      run: zig fmt --check .

    - name: Run unit tests and example checks (TCP status compile-only)
      run: |
        max_attempts=3
        for attempt in $(seq 1 $max_attempts); do
          if zig build test --summary all; then
            echo "Successfully ran unit tests on attempt $attempt"
            exit 0
          fi
          echo "Attempt $attempt/$max_attempts failed, retrying in 5 seconds..."
          # Zig 0.16 occasionally fails on a first run with
          # `failed to parse archive: FileNotFound` against an internally-generated
          # `libcompiler_rt.a`. The hash dir is content-addressed, so naive retries
          # replay the same broken state. Wipe `o/` so the next attempt rebuilds
          # compiler_rt and any other transient artifacts from scratch.
          rm -rf ~/.cache/zig/o ~/.cache/zig/tmp .zig-cache/o .zig-cache/tmp || true
          df -h /
          sleep 5
        done
        echo "All unit test attempts failed"
        exit 1

    - name: Prune local Zig build artifacts
      if: always()
      run: |
        rm -rf .zig-cache/o .zig-cache/tmp || true
        df -h /

    - name: Wire fuzz harness (std.testing.fuzz smoke, #44)
      run: zig build fuzz --summary all

    - name: Microbenchmarks (compile + smoke run, #19)
      run: zig build bench --summary all

    - name: Build example executables
      run: |
        max_attempts=3
        for attempt in $(seq 1 $max_attempts); do
          if zig build examples; then
            echo "Successfully built examples on attempt $attempt"
            exit 0
          fi
          echo "Attempt $attempt/$max_attempts failed, retrying in 5 seconds..."
          rm -rf ~/.cache/zig/o ~/.cache/zig/tmp .zig-cache/o .zig-cache/tmp || true
          sleep 5
        done
        echo "All example build attempts failed"
        exit 1

    - name: build
      run: |
        max_attempts=3
        for attempt in $(seq 1 $max_attempts); do
          if zig build; then
            echo "Successfully built on attempt $attempt"
            exit 0
          fi
          echo "Attempt $attempt/$max_attempts failed, retrying in 5 seconds..."
          rm -rf ~/.cache/zig/o ~/.cache/zig/tmp .zig-cache/o .zig-cache/tmp || true
          sleep 5
        done
        echo "All build attempts failed"
        exit 1
