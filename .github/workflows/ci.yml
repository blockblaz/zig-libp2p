on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

name: CI

jobs:
  zig:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Zig
      uses: mlugg/setup-zig@v2.0.5
      with:
        version: 0.16.0

    - name: Cache Zig packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/zig
        key: ${{ runner.os }}-zig-${{ hashFiles('build.zig.zon', 'build.zig', 'examples/**') }}
        restore-keys: |
          ${{ runner.os }}-zig-

    - name: Fetch Zig dependencies
      run: |
        max_attempts=3
        for attempt in $(seq 1 $max_attempts); do
          if zig build --fetch; then
            echo "Successfully fetched dependencies on attempt $attempt"
            exit 0
          fi
          echo "Attempt $attempt/$max_attempts failed, retrying in 5 seconds..."
          sleep 5
        done
        echo "All fetch attempts failed"
        exit 1

    - name: Lint
      run: zig fmt --check .

    - name: Run unit tests and example checks (TCP status compile-only)
      run: |
        max_attempts=3
        for attempt in $(seq 1 $max_attempts); do
          if zig build test --summary all; then
            echo "Successfully ran unit tests on attempt $attempt"
            exit 0
          fi
          echo "Attempt $attempt/$max_attempts failed, retrying in 5 seconds..."
          sleep 5
        done
        echo "All unit test attempts failed"
        exit 1

    - name: Build example executables
      run: |
        max_attempts=3
        for attempt in $(seq 1 $max_attempts); do
          if zig build examples; then
            echo "Successfully built examples on attempt $attempt"
            exit 0
          fi
          echo "Attempt $attempt/$max_attempts failed, retrying in 5 seconds..."
          sleep 5
        done
        echo "All example build attempts failed"
        exit 1

    - name: build
      run: |
        max_attempts=3
        for attempt in $(seq 1 $max_attempts); do
          if zig build; then
            echo "Successfully built on attempt $attempt"
            exit 0
          fi
          echo "Attempt $attempt/$max_attempts failed, retrying in 5 seconds..."
          sleep 5
        done
        echo "All build attempts failed"
        exit 1
