# release-please opens/updates release PRs. If CI fails with
# "GitHub Actions is not permitted to create or approve pull requests", either:
#   Settings → Actions → General → Workflow permissions → enable
#   "Allow GitHub Actions to create and approve pull requests", or
#   add repo secret RELEASE_PLEASE_TOKEN (fine-grained PAT: Contents + Pull requests write).
on:
  push:
    branches:
      - main

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Explicit job permissions so the default branch token can open release PRs.
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      # googleapis/release-please-action still targets Node 20; opt into Node 24 on the runner.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Prefer a PAT when the repo disallows GITHUB_TOKEN from creating PRs.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
