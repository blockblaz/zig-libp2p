# Phase B2 — QUIC interop matrix.
#
# Split into two trigger surfaces so day-to-day PRs only see the
# green baseline; cross-impl rows run on cron + manual dispatch only,
# where their TAP `not ok` lines are the canary for upstream zquic
# interop gaps and aren't expected to be green yet.
#
#   pull_request          → same-impl only (must be green).
#   schedule / dispatch   → full matrix incl. cross-impl.
name: Interop QUIC (cross-impl)

on:
  pull_request:
    paths:
      - "interop_quic/impls/**"
      - "interop_quic/run_matrix.sh"
      - ".github/workflows/interop-quic-cross.yml"
  schedule:
    # Nightly at 04:30 UTC.
    - cron: "30 4 * * *"
  workflow_dispatch:

jobs:
  # Same-impl: zig↔zig and go↔go for handshake + ping. Both pass
  # locally; required green on every PR. Runs on every trigger so a
  # cron failure here is a real regression, not an upstream gap.
  same-impl:
    name: same-impl baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build zig binaries
        run: zig build -Doptimize=ReleaseFast

      - name: Build go-libp2p binary
        working-directory: interop_quic/impls/go-libp2p
        run: go build -trimpath -o interop-quic-node-go .

      - name: Matrix — zig ↔ zig
        # gossipsub is included so the runner exercises the skip path on
        # the zig side; the case statement in run_matrix.sh marks it as
        # TAP `skip`, not `not ok`.
        run: bash interop_quic/run_matrix.sh zig handshake,ping,gossipsub

      - name: Matrix — go-libp2p ↔ go-libp2p
        run: bash interop_quic/run_matrix.sh go-libp2p handshake,ping,gossipsub

  # Cross-impl: zig ↔ go-libp2p in both directions × {handshake, ping}.
  # Currently exercises outstanding zquic ↔ quic-go TLS gaps; once those
  # land in upstream zquic + this repo bumps the dep, this job flips
  # green without further changes here. NOT gated on pull_request — the
  # `not ok` lines clutter PR reviews and don't reflect anything the PR
  # author can fix locally.
  cross-impl:
    name: cross-impl (zig ↔ go-libp2p)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build zig binaries
        run: zig build -Doptimize=ReleaseFast

      - name: Build go-libp2p binary
        working-directory: interop_quic/impls/go-libp2p
        run: go build -trimpath -o interop-quic-node-go .

      - name: Matrix — zig ↔ go-libp2p
        continue-on-error: true
        run: bash interop_quic/run_matrix.sh zig,go-libp2p handshake,ping,gossipsub
