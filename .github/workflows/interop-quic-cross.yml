# Phase B2 — QUIC interop matrix.
#
#   pull_request  → same-impl baseline + cross-impl zig↔go and zig↔rust ping.
#   schedule / dispatch → full matrix (all three impls × four testcases).
name: Interop QUIC (cross-impl)

on:
  pull_request:
    paths:
      - "harness/quic/impls/**"
      - "harness/quic/run_matrix.sh"
      - "examples/interop_quic_node.zig"
      - "build.zig"
      - "build/interop.zig"
      - ".github/workflows/interop-quic-cross.yml"
  schedule:
    # Nightly at 04:30 UTC.
    - cron: "30 4 * * *"
  workflow_dispatch:

jobs:
  # Same-impl: zig↔zig and go↔go for handshake + ping. Both pass
  # locally; required green on every PR.
  same-impl:
    name: same-impl baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build zig binaries
        run: zig build -Doptimize=ReleaseFast

      - name: Build go-libp2p binary
        working-directory: harness/quic/impls/go-libp2p
        run: go build -trimpath -o interop-quic-node-go .

      - name: Build rust-libp2p binary
        working-directory: harness/quic/impls/rust-libp2p
        run: cargo build --release --locked

      - name: Matrix — zig ↔ zig
        run: bash harness/quic/run_matrix.sh zig handshake,ping,gossipsub,reqresp

      - name: Matrix — go-libp2p ↔ go-libp2p
        run: bash harness/quic/run_matrix.sh go-libp2p handshake,ping,gossipsub,reqresp

      - name: Matrix — rust-libp2p ↔ rust-libp2p
        run: bash harness/quic/run_matrix.sh rust-libp2p handshake,ping,gossipsub,reqresp

  # Cross-impl: zig ↔ go-libp2p in both directions × {handshake, ping}.
  cross-impl-go:
    name: cross-impl (zig ↔ go-libp2p)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build zig binaries
        run: zig build -Doptimize=ReleaseFast

      - name: Build go-libp2p binary
        working-directory: harness/quic/impls/go-libp2p
        run: go build -trimpath -o interop-quic-node-go .

      - name: Matrix — zig ↔ go-libp2p (handshake)
        run: bash harness/quic/run_matrix.sh zig,go-libp2p handshake

      - name: Matrix — zig ↔ go-libp2p (ping)
        run: bash harness/quic/run_matrix.sh zig,go-libp2p ping

  # Cross-impl: zig ↔ rust-libp2p in both directions × {handshake, ping}.
  cross-impl-rust:
    name: cross-impl (zig ↔ rust-libp2p)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build zig binaries
        run: zig build -Doptimize=ReleaseFast

      - name: Build rust-libp2p binary
        working-directory: harness/quic/impls/rust-libp2p
        run: cargo build --release --locked

      - name: Matrix — zig ↔ rust-libp2p (handshake)
        run: bash harness/quic/run_matrix.sh zig,rust-libp2p handshake

      - name: Matrix — zig ↔ rust-libp2p (ping)
        run: bash harness/quic/run_matrix.sh zig,rust-libp2p ping

  # Full matrix on cron / manual only.
  cross-impl-full:
    name: cross-impl full (incl. rust)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build zig binaries
        run: zig build -Doptimize=ReleaseFast

      - name: Build go-libp2p binary
        working-directory: harness/quic/impls/go-libp2p
        run: go build -trimpath -o interop-quic-node-go .

      - name: Build rust-libp2p binary
        working-directory: harness/quic/impls/rust-libp2p
        run: cargo build --release --locked

      - name: Matrix — zig ↔ go-libp2p ↔ rust-libp2p
        run: bash harness/quic/run_matrix.sh zig,go-libp2p,rust-libp2p handshake,ping,gossipsub,reqresp
